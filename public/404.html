<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Страница не найдена | Amiron Restaurant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #c0392b, #27ae60);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-container {
      text-align: center;
      color: white;
      padding: 20px;
      max-width: 600px;
    }
    h1 {
      font-size: 120px;
      margin: 0;
      font-weight: 800;
      text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
    }
    h2 {
      font-size: 32px;
      margin: 20px 0;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.9;
    }
    .home-link {
      display: inline-block;
      background: white;
      color: #c0392b;
      padding: 12px 30px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .home-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    @media (max-width: 768px) {
      h1 { font-size: 80px; }
      h2 { font-size: 24px; }
      p { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <h2>Страница не найдена</h2>
    <p>Извините, запрашиваемая страница не существует</p>
    <a href="/" class="home-link">Вернуться на главную</a>
  </div>
</body>
</html>
