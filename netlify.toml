[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "18"

# Используем официальный плагин Next.js для Netlify
[[plugins]]
package = "@netlify/plugin-nextjs"

# Перенаправление для всех маршрутов (для SPA-роутинга)
[[redirects]]
from = "/*"
to = "/:splat"
status = 200
force = true

# Исключения для статических файлов
[[redirects]]
from = "/_next/*"
to = "/_next/:splat"
status = 200

[[redirects]]
from = "/images/*"
to = "/images/:splat"
status = 200

[[redirects]]
from = "/video/*"
to = "/video/:splat"
status = 200

# Обработка 404 ошибок
[[redirects]]
from = "/*"
to = "/404.html"
status = 404

# Заголовки для кэширования
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/images/*"
[headers.values]
Cache-Control = "public, max-age=2592000"

[[headers]]
for = "/video/*"
[headers.values]
Cache-Control = "public, max-age=2592000"

# Функции для API маршрутов (если есть)
[functions]
directory = "netlify/functions"
